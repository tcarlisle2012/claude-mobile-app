databaseChangeLog:
  - changeSet:
      id: 004-create-verification-tokens-table
      author: mobileapp
      comment: Create the email verification tokens table
      changes:
        - createTable:
            tableName: verification_tokens
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: token
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: expiry_date
                  type: TIMESTAMP
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: verification_tokens
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_verification_tokens_user
            onDelete: CASCADE

        - createIndex:
            tableName: verification_tokens
            indexName: idx_verification_tokens_token
            columns:
              - column:
                  name: token
