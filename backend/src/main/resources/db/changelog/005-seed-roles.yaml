databaseChangeLog:
  - changeSet:
      id: 005-seed-roles
      author: mobileapp
      comment: Seed the default ROLE_USER and ROLE_ADMIN roles
      changes:
        - insert:
            tableName: roles
            columns:
              - column:
                  name: name
                  value: ROLE_USER
        - insert:
            tableName: roles
            columns:
              - column:
                  name: name
                  value: ROLE_ADMIN
