services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: mobileapp
      DB_USERNAME: mobileapp
      DB_PASSWORD: mobileapp
      JWT_SECRET: dGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5IGZvciBKV1QgdG9rZW4gc2lnbmluZyB0aGF0IGlzIGF0IGxlYXN0IDUxMiBiaXRzIGxvbmc=
      APP_BASE_URL: http://localhost:8080
      CORS_ORIGINS: "*"
      MAIL_HOST: mailpit
      MAIL_PORT: "1025"
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin
      ADMIN_EMAIL: admin@mobileapp.com
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: mobileapp
      POSTGRES_USER: mobileapp
      POSTGRES_PASSWORD: mobileapp
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mobileapp -d mobileapp"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"
    restart: unless-stopped

volumes:
  pgdata:
